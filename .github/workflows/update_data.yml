name: Update Currency Data

on:
  schedule:
    # Frankfurter/ECB update kurs sekitar jam 16:00 CET/CEST.
    # GitHub Actions cron selalu pakai UTC, dan CET berubah offset saat
    # daylight saving time, jadi disiapkan 2 jadwal (+30 menit buffer):
    #   - 14:30 UTC -> 16:30 CEST (musim panas, sekitar Maret-Oktober)
    #   - 15:30 UTC -> 16:30 CET  (musim dingin, sekitar Oktober-Maret)
    # Salah satunya akan jadi "run tambahan" tergantung musim yang sedang
    # berlaku - tidak masalah, cuma re-fetch data yang sama, tidak merusak apapun.
    - cron: "30 14 * * *"
    - cron: "30 15 * * *"
  workflow_dispatch:
    # Supaya bisa di-trigger manual dari tab "Actions" di GitHub, buat testing

permissions:
  contents: write   # wajib, supaya job ini bisa commit & push balik ke repo

jobs:
  update-data:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependency ringan (tanpa Spark)
        run: |
          pip install --no-cache-dir requests pandas pyarrow

      - name: Jalankan update data
        run: python ci_update_data.py

      - name: Commit & push perubahan data
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: auto-update data kurs [skip ci]"
          file_pattern: "data/output/history/*.parquet data/output/latest/*.parquet"
